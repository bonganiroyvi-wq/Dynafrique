<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Supplier Registration | Dynafrique Solutions</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Supplier Registration</h1>
    <p>Join our network and get matched with real customers</p>
  </header>

  <main class="container">
    <form name="supplier-form" method="POST" data-netlify="true" action="thank-you.html">
      <input type="hidden" name="form-name" value="supplier-form">

      <label for="company">Company Name</label>
      <input type="text" name="company" id="company" required />

      <label for="service">What service do you offer?</label>
      <select name="service" id="service" required>
        <option value="">Select...</option>
        <option value="Solar">Solar</option>
        <option value="Fuel">Fuel</option>
      </select>

      <label for="area">Service Area</label>
      <input type="text" name="area" id="area" placeholder="e.g. Mpumalanga, Gauteng" required />

      <label for="email">Email</label>
      <input type="email" name="email" id="email" required />

      <label for="phone">Phone</label>
      <input type="tel" name="phone" id="phone" required />

      <button type="submit" class="btn">Register Supplier</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2025 Dynafrique Solutions</p>
  </footer>
</body>
</html>
