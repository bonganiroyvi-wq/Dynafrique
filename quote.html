<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Get a Quote | Dynafrique Solutions</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script src="scripts.js" defer></script>
</head>
<body>
  <header>
    <h1>Get a Quote</h1>
    <p>Request Solar or Fuel services quickly and easily</p>
  </header>

  <main class="container">
    <form name="quote-form" method="POST" data-netlify="true" action="thank-you.html">
      <input type="hidden" name="form-name" value="quote-form">
      <input type="hidden" name="service" id="service-input" value="">

      <!-- Service Selection -->
      <section class="services-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:1.5rem; margin-bottom:2rem;">
        <!-- Solar -->
        <div class="card service-card" data-service="Solar">
          <i class="fas fa-solar-panel" style="font-size:3rem; color:#ffdd57; margin-bottom:1rem;"></i>
          <h3>Solar</h3>
          <p>Connect with verified solar suppliers for homes and businesses.</p>
        </div>
        <!-- Fuel -->
        <div class="card service-card" data-service="Fuel">
          <i class="fas fa-gas-pump" style="font-size:3rem; color:#ffdd57; margin-bottom:1rem;"></i>
          <h3>Fuel</h3>
          <p>Get bulk fuel from trusted suppliers quickly and safely.</p>
        </div>
      </section>

      <!-- Customer Details -->
      <section class="card" style="text-align:left;">
        <label for="name">Full Name</label>
        <input type="text" name="name" id="name" placeholder="John Doe" required />

        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="john@example.com" required />

        <label for="phone">Phone</label>
        <input type="tel" name="phone" id="phone" placeholder="+27 82 123 4567" required />

        <label for="details">Additional Details (optional)</label>
        <textarea name="details" id="details" rows="3" placeholder="e.g., Solar for 3-bedroom house"></textarea>

        <button type="submit" class="btn" style="width:100%; margin-top:1rem;">Submit Request</button>
      </section>
    </form>
  </main>

  <footer>
    <p>&copy; 2025 Dynafrique Solutions</p>
  </footer>
</body>
</html>
