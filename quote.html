<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Get a Quote | Dynafrique Solutions</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="scripts.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<body>
  <header>
    <h1>Get a Quote</h1>
    <p>Quickly request Solar or Fuel services in your area</p>

  <main class="container">
    <form name="quote-form" method="POST" data-netlify="true" action="thank-you.html">
      <input type="hidden" name="form-name" value="quote-form">
      <input type="hidden" name="service" id="service-input" value="">

      <!-- Service Selection -->
      <section class="services-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:1.5rem; margin-bottom:2rem;">
